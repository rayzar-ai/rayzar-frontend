# =============================================================================
# .github/workflows/deploy.yml — RayZar Frontend CI/CD
#
# On every push/PR to main:  type-check + lint
# On push to main (after checks pass):  deploy to Vercel production
#
# Required GitHub Secrets (Settings → Secrets and variables → Actions):
#   VERCEL_TOKEN      — vercel.com/account/tokens → "Create Token"
#   VERCEL_ORG_ID     — Vercel project → Settings → General → "Team ID"
#                       (personal accounts: use your Vercel account ID)
#   VERCEL_PROJECT_ID — Vercel project → Settings → General → "Project ID"
# =============================================================================

name: CI / Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Checks ─────────────────────────────────────────────────────────────────
  check:
    name: Type-check and lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

  # ── Deploy to Vercel ────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Vercel (production)
    runs-on: ubuntu-latest
    needs: check
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: "--prod"
